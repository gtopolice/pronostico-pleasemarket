version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: please
      POSTGRES_PASSWORD: please
      POSTGRES_DB: please
    ports:
      - "5433:5432"
    volumes:
      - please_pg:/var/lib/postgresql/data

  worker:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://please:please@postgres:5432/please
    depends_on:
      - postgres

volumes:
  please_pg:
